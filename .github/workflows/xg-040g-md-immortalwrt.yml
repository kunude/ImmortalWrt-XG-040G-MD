name: Build_XG_040G_MD-immortalwrt

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "是否开启详细编译日志 (Debug模式)"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo timedatectl set-timezone "$TZ"

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Apply XG-040G-MD Patch Files
        run: |
          # 检查 patch 目录和脚本是否存在
          if [ -d "patch" ] && [ -f "patch/patch.sh" ]; then
            echo "--- 正在应用自动化补丁 ---"
            chmod +x patch/patch.sh
            cd patch && ./patch.sh
            echo "--- 补丁应用成功 ---"
          else
            echo "错误: 未找到 patch 文件夹或 patch.sh 脚本！"
            exit 1
          fi

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy configuration and defconfig
        run: |
          [ -f "${CONFIG_FILE}" ] && cp -fv "${CONFIG_FILE}" openwrt/.config || echo "警告: 未找到配置文件"
          cd openwrt && make defconfig

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j$(nproc) V=s
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc) || make -j1 V=s
          fi
          
          # 提取设备名称用于命名
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          [ -n "$DEVICE_NAME" ] && echo "DEVICE_NAME=_$DEVICE_NAME" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Organize firmware artifacts
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Create GitHub Release
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.REPO_BRANCH }}-${{ env.FILE_DATE }}
          body: |
            🚀 XG-040G-MD 固件自动构建
            - 源码: ${{ env.REPO_URL }}
            - 分支: ${{ env.REPO_BRANCH }}
            - 构建时间: ${{ env.FILE_DATE }}
          artifacts: "${{ env.FIRMWARE }}/*"
          token: ${{ secrets.GITHUB_TOKEN }}
