name: Build_XG_040G_MD-immortalwrt

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
      commit_hash:
        description: "指定Git提交哈希(留空默认使用最新提交)"
        required: false
        type: string
      patch_type:
        description: "选择补丁版本"
        required: true
        default: "patch-bingoguo93"
        type: choice
        options:
          - patch-bingoguo93
          - patch-xiangtailiang
  # 每24小时检查一次（UTC 0点，北京时间8点）
  schedule:
    - cron: '0 0 * * *'

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    # 🔥 修复点：删除了非法的 job 级别 if 判断

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check remote branch for new commits
        id: check_commit
        run: |
          LATEST_COMMIT=$(git ls-remote ${{ env.REPO_URL }} ${{ env.REPO_BRANCH }} | awk '{print $1}')
          echo "LATEST_COMMIT=$LATEST_COMMIT" >> $GITHUB_ENV
          echo "🔍 远程分支最新Commit: $LATEST_COMMIT"
          
          CACHED_COMMIT=$(cat last_commit.txt 2>/dev/null || echo "")
          echo "🔍 上一次构建Commit: $CACHED_COMMIT"
          
          # 定时触发：无更新则终止构建
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "$LATEST_COMMIT" == "$CACHED_COMMIT" ]]; then
              echo "✅ 无新Commit，终止定时构建"
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "🚀 检测到新Commit，开始自动构建"
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "$LATEST_COMMIT" > last_commit.txt
            fi
          else
            echo "🚀 手动触发构建"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      # 🔥 修复点：步骤内部判断，无更新直接退出Job（语法合法）
      - name: Exit if no new commit
        if: steps.check_commit.outputs.should_build == 'false'
        run: exit 0

      - name: Cache last commit record
        uses: actions/cache@v4
        with:
          path: last_commit.txt
          key: last-commit-cache-${{ github.run_id }}
          restore-keys: last-commit-cache-

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          cd openwrt
          if [ -n "${{ inputs.commit_hash }}" ]; then
            git fetch origin ${{ inputs.commit_hash }}
            git checkout ${{ inputs.commit_hash }}
          fi
          echo "COMMIT_HASH_FULL=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=format:%s)" >> $GITHUB_ENV
          echo "COMMIT_DATE=$(git log -1 --pretty=format:"%Y-%m-%d %H:%M:%S" --date=local)" >> $GITHUB_ENV

      - name: Apply XG-040G-MD Patch Files
        working-directory: ./openwrt
        run: |
          SELECTED_PATCH=${{ inputs.patch_type || 'patch-bingoguo93' }}
          echo "SELECTED_PATCH=$SELECTED_PATCH" >> $GITHUB_ENV
          
          if [ -d "../$SELECTED_PATCH" ] && [ -f "../$SELECTED_PATCH/patch.sh" ]; then
            echo "--- 正在应用补丁：$SELECTED_PATCH ---"
            cp -r -f ../$SELECTED_PATCH .
            chmod +x $SELECTED_PATCH/patch.sh
            cd $SELECTED_PATCH && ./patch.sh
            echo "--- 补丁应用成功 ---"
          else
            echo "错误: 未找到 $SELECTED_PATCH 补丁目录或脚本！"
            exit 1
          fi

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy configuration and defconfig
        run: |
          [ -f "${CONFIG_FILE}" ] && cp -fv "${CONFIG_FILE}" openwrt/.config || echo "警告: 未找到配置文件"
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j$(nproc) V=s
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc) || make -j1 V=s
          fi
          
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          [ -n "$DEVICE_NAME" ] && echo "DEVICE_NAME=_$DEVICE_NAME" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Organize firmware artifacts
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware to Artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 XG-040G-MD 固件自动构建
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          源码仓库: ${{ env.REPO_URL }}
          分支: ${{ env.REPO_BRANCH }}
          使用补丁: ${{ env.SELECTED_PATCH }}
          Commit Date: ${{ env.COMMIT_DATE }}
          Commit Hash: ${{ env.COMMIT_HASH }}
          Commit: [${{ env.COMMIT_MSG }}](${{ env.REPO_URL }}/commit/${{ env.COMMIT_HASH_FULL }})
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: "${{ env.FIRMWARE }}/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
